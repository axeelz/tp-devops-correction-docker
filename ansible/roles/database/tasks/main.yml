- name: Run Database
  community.docker.docker_container:
    name: database
    image: axlz/tp-devops-database:latest
    networks:
      - name: app-network
    env:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - db-data:/var/lib/postgresql/data
    recreate: yes
    pull: true
  vars:
    ansible_python_interpreter: /opt/docker_venv/bin/python
